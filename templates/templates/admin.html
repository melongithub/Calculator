<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台账号管理</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; color: white; text-decoration: none; font-size: 14px; }
        .btn-blue { background-color: #007bff; }
        .btn-red { background-color: #dc3545; }
        .btn-green { background-color: #28a745; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background-color: #f8f9fa; }
        .msg { color: green; font-weight: bold; margin-bottom: 15px; }
        .add-box { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        input[type="text"], input[type="password"] { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>⚙️ 账号管理中心</h2>
            <div>
                <span>当前登录: <b>{{ current_user }}</b></span> &nbsp;&nbsp;
                <a href="/calculator" class="btn btn-blue">返回计算器</a>
                <a href="/logout" class="btn btn-red">退出登录</a>
            </div>
        </div>

        {% if message %}
        <div class="msg">{{ message }}</div>
        {% endif %}

        <!-- 添加新账号区域 -->
        <div class="add-box">
            <h3>➕ 添加新账号</h3>
            <form method="post" style="display: flex; align-items: center;">
                <input type="hidden" name="action" value="add">
                <input type="text" name="new_username" placeholder="输入新账号" required>
                <input type="password" name="new_password" placeholder="输入密码" required>
                <button type="submit" class="btn btn-green">确认添加</button>
            </form>
        </div>

        <!-- 账号列表区域 -->
        <h3>👥 当前系统账号列表</h3>
        <table>
            <tr>
                <th>ID</th>
                <th>账号名称</th>
                <th>修改密码</th>
                <th>删除账号</th>
            </tr>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td><b>{{ user.username }}</b></td>
                <td>
                    <form method="post" style="display:inline;">
                        <input type="hidden" name="action" value="change_pwd">
                        <input type="hidden" name="user_id" value="{{ user.id }}">
                        <input type="password" name="new_password" placeholder="新密码" required style="width: 100px;">
                        <button type="submit" class="btn btn-blue">修改</button>
                    </form>
                </td>
                <td>
                    <form method="post" style="display:inline;" onsubmit="return confirm('确定要删除账号 {{ user.username }} 吗？');">
                        <input type="hidden" name="action" value="delete">
                        <input type="hidden" name="user_id" value="{{ user.id }}">
                        <button type="submit" class="btn btn-red">删除</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
